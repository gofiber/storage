on:
  push:
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'etcd/**'
  workflow_dispatch:
name: "Tests Etcd"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: etcd/go.sum
      - name: Run Test
        env:
          TEST_ETCD_IMAGE: gcr.io/etcd-development/etcd:v3.6.6
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: ./etcd
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
