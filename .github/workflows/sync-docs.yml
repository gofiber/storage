name: 'Sync docs'
on:
  push:
    branches:
      - master
      - main
    paths:
      - '**/*.md'
  release:
    types: [published]
  repository_dispatch:
    types: [sync-docs]
  workflow_dispatch:
jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install JQ
        run: sudo apt-get install jq
      - name: Sync docs
        run: ./.github/scripts/sync_docs.sh
        env:
          EVENT: ${{ github.event_name == 'repository_dispatch' && 'push' || github.event_name }}
          TAG_NAME: ${{ github.event_name == 'repository_dispatch' && '' || github.ref_name }}
          TOKEN: ${{ secrets.DOC_SYNC_TOKEN }}
