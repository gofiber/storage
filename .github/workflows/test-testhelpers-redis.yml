on:
  push:
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'testhelpers/redis/**'
  workflow_dispatch:
name: "Tests TestHelper Redis"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
        redis:
          - '7'
          - '8'
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: testhelpers/redis/go.sum
      - name: Run Test
        env:
          TEST_REDIS_IMAGE: "public.ecr.aws/docker/library/redis:${{ matrix.redis }}"
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: testhelpers/redis
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
