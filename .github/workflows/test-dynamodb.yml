on:
  push:
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'dynamodb/**'
  workflow_dispatch:
name: "Tests DynamoDB"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongo:
        image: 'public.ecr.aws/aws-dynamodb-local/aws-dynamodb-local:3.3.0'
        ports:
          - '8000:8000'
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: dynamodb/go.sum
      - name: Run Test
        env:
          TEST_DYNAMODB_IMAGE: "public.ecr.aws/aws-dynamodb-local/aws-dynamodb-local:latest"
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: ./dynamodb
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
