name: Release Drafter (All)

on:
    push:
        branches:
            - master
            - main
    workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            pull-requests: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Generate filters
              id: filter-setup
              run: |
                  # Add filter for core package (root directory files)
                  filters="core: [\"*.go\", \"*.md\", \"go.mod\", \"go.sum\"]"
                  filters+=$'\n'
                  # Add filters for subdirectories
                  filters+=$(find . -maxdepth 1 -type d ! -path ./.git ! -path . ! -path ./testhelpers -exec basename {} \; | grep -v '^\.' | awk '{printf "%s: \"%s/**\"\n", $1, $1}')
                  echo "filters<<EOF" >> $GITHUB_OUTPUT
                  echo "$filters" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT
              shell: bash
            - name: Filter changes
              id: filter
              uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
              with:
                  filters: ${{ steps.filter-setup.outputs.filters }}
        outputs:
            packages: ${{ steps.filter.outputs.changes || '[]' }}

    release-drafter:
        needs: changes
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: needs.changes.outputs.packages != '[]'
        permissions:
            contents: write
            pull-requests: read
        strategy:
            matrix:
                package: ${{ fromJSON(needs.changes.outputs.packages || '[]') }}
        steps:
            - name: Checkout shared config
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  repository: gofiber/.github
                  sparse-checkout: .github/release-drafter-module.yml
                  sparse-checkout-cone-mode: false

            - name: Generate config from shared template
              run: |
                  sed "s|{{MODULE}}|${{ matrix.package }}|g" \
                      .github/release-drafter-module.yml > .github/release-drafter-parsed.yml

            - name: Run release drafter
              uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
              with:
                  config-name: file:release-drafter-parsed.yml
