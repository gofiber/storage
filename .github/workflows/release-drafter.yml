name: Release Drafter (All)

on:
    push:
        branches:
            - master
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Generate filters
              id: filter-setup
              run: |
                  # Add filter for core package (root directory files)
                  filters="core: [\"*.go\", \"*.md\", \"go.mod\", \"go.sum\"]"
                  filters+=$'\n'
                  # Add filters for subdirectories
                  filters+=$(find . -maxdepth 1 -type d ! -path ./.git ! -path . ! -path ./testhelpers -exec basename {} \; | grep -v '^\.' | awk '{printf "%s: \"%s/**\"\n", $1, $1}')
                  echo "filters<<EOF" >> $GITHUB_OUTPUT
                  echo "$filters" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT
              shell: bash
            - name: Filter changes
              id: filter
              uses: dorny/paths-filter@v4
              with:
                  filters: ${{ steps.filter-setup.outputs.filters }}
        outputs:
            packages: ${{ steps.filter.outputs.changes || '[]' }}

    release-drafter:
        needs: changes
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: needs.changes.outputs.packages != '[]'
        permissions:
            contents: write
            pull-requests: read
        strategy:
            matrix:
                package: ${{ fromJSON(needs.changes.outputs.packages || '[]') }}
        steps:
            - name: Checkout shared config
              uses: actions/checkout@v6
              with:
                  repository: gofiber/.github
                  sparse-checkout: .github/release-drafter-module.yml
                  sparse-checkout-cone-mode: false

            - name: Generate config from shared template
              run: |
                  sed "s|{{MODULE}}|${{ matrix.package }}|g" \
                      .github/release-drafter-module.yml > release-drafter-parsed.yml

            - name: Run release drafter
              uses: release-drafter/release-drafter@v7
              with:
                  config-name: file:release-drafter-parsed.yml
