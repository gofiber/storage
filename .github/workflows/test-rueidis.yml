on:
  push:
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'rueidis/**'
  workflow_dispatch:
name: "Tests Rueidis"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
        redis:
          - '7'
          - '8'
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Redis Cluster
        uses: vishnudxb/redis-cluster@e29c352fa58527003afc982e96db437c0c49e6aa # 1.10.0
        with:
          master1-port: 7000
          master2-port: 7001
          master3-port: 7002
          slave1-port: 7003
          slave2-port: 7004
          slave3-port: 7005
          sleep-duration: 10
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: rueidis/go.sum
      - name: Run Test
        env:
          TEST_REDIS_IMAGE: "public.ecr.aws/docker/library/redis:${{ matrix.redis }}"
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: ./rueidis
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
