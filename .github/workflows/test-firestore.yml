on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:
    paths:
      - "firestore/**"
name: "Tests Firestore"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "${{ matrix.go-version }}"
          cache-dependency-path: firestore/go.sum
      - name: Run Test
        env:
          TEST_FIRESTORE_IMAGE: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: ./firestore
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
