name: Tests CloudflareKV
on:
  push:
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'cloudflarekv/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: cloudflarekv/go.sum
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
      - name: Start Wrangler Dev
        run: |
          .github/scripts/initialize-wrangler.sh
          cd cloudflarekv && npx wrangler dev &
          npx wait-on tcp:8787
      - name: Run Go Tests
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: cloudflarekv
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
