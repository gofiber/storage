on:
  push:
    branches:
      - master
      - main
  pull_request:
    paths:
      - 'mssql/**'
  workflow_dispatch:
name: "Tests MSSQL"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mssql:
        image: 'mcmoe/mssqldocker:latest'
        ports:
          - '1433:1433'
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: MsSql!1234
          MSSQL_DB: master
          MSSQL_USER: sa
          MSSQL_PASSWORD: MsSql!1234
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -U sa -P $SA_PASSWORD -Q 'select 1' -b -o /dev/null" --health-interval 1s --health-timeout 30s --health-start-period 10s --health-retries 20
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: mssql/go.sum
      - name: Run Test
        env:
          MSSQL_DATABASE: master
          MSSQL_USERNAME: sa
          MSSQL_PASSWORD: MsSql!1234
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: ./mssql
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
